<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reward Survey</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-green': '#b6f8bd', 
                        'dark-bg': '#000000', // Pure Black
                        'deep-green': '#0a2f15',
                    },
                    animation: {
                        'gentle-bounce': 'gentle-bounce 2s ease-in-out infinite',
                    },
                    keyframes: {
                        'gentle-bounce': {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.03)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Hide scrollbar for the carousel */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        html { scroll-behavior: smooth; }

        /* 3D Dollar Sign Styling */
        .dollar-3d {
            background: linear-gradient(to bottom, #dcfce7 0%, #22c55e 50%, #14532d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.7));
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="bg-dark-bg text-white font-sans antialiased min-h-screen flex flex-col items-center pb-10">

    <div class="w-full max-w-md px-4 pt-8 space-y-6">

        <div class="flex flex-col items-center justify-center relative mb-2 mt-4">
            <div class="relative w-40 h-40 flex items-center justify-center">
                <div class="absolute inset-0 bg-green-600 blur-[70px] opacity-30 rounded-full"></div>
                <div class="relative z-10 w-32 h-32 rounded-full bg-black flex items-center justify-center border-[5px] border-green-400/90 shadow-[0_0_40px_rgba(34,197,94,0.6),inset_0_0_20px_rgba(34,197,94,0.3)] ring-4 ring-green-900/30">
                    <span class="text-[70px] font-black dollar-3d">$</span>
                </div>
            </div>
            
            <div class="text-center mt-4 z-10 relative">
                 <p class="text-green-400 text-xs font-bold tracking-[0.2em] uppercase glow-text">claim rewards</p>
                 <p class="text-xs text-gray-400 mt-1">Just by completing surveys</p>
            </div>
        </div>

        <div class="text-center space-y-2">
            <h1 class="text-2xl font-bold flex items-center justify-center gap-2">
                <span class="text-yellow-400">✨</span> Reward Survey <span class="text-yellow-400">✨</span>
            </h1>
            <p class="text-sm font-medium flex items-center justify-center gap-2 text-gray-400">
                <span>💸</span> Choose Your Rewards <span>💸</span>
            </p>
        </div>

        <div class="space-y-4 py-4">
            
            <a href="#" class="block group relative animate-gentle-bounce">
                <div class="absolute -inset-0.5 bg-green-500/40 rounded-full blur-md opacity-70 transition duration-200"></div>
                <div class="relative w-full bg-neon-green hover:bg-green-300 text-black rounded-full py-4 px-5 flex items-center shadow-xl ring-2 ring-green-400/50">
                    <div class="bg-white/90 p-2 rounded-full mr-4 shadow-sm">
                        <i data-lucide="shopping-bag" class="w-7 h-7 text-blue-600"></i>
                    </div>
                    <div class="flex flex-col text-left">
                        <span class="font-black text-xl text-green-950 leading-tight">$500 Walmart 🎁</span>
                        <span class="text-xs text-green-900 font-bold uppercase tracking-wider">(Complete deals)</span>
                    </div>
                    <div class="ml-auto"><i data-lucide="chevron-right" class="w-6 h-6 text-green-900/70"></i></div>
                </div>
            </a>

        </div>

        <div class="space-y-4">
            <div class="text-center">
                <h2 class="text-xl font-bold flex items-center justify-center gap-2">Top Claims <span>💰</span></h2>
            </div>

            <div class="relative w-full aspect-[9/16] bg-black rounded-2xl overflow-hidden border border-gray-800 shadow-2xl">
                
                <div id="slider" class="flex w-full h-full overflow-x-scroll scrollbar-hide snap-x snap-mandatory">
                    
                    <div class="w-full h-full flex-shrink-0 snap-center flex items-center justify-center bg-black relative">
                        <img src="slide1.jpg" alt="Proof 1" class="w-full h-full object-contain">
                    </div>

                    <div class="w-full h-full flex-shrink-0 snap-center flex items-center justify-center bg-black relative">
                        <img src="slide2.jpg" alt="Proof 2" class="w-full h-full object-contain">
                    </div>

                    <div class="w-full h-full flex-shrink-0 snap-center flex items-center justify-center bg-black relative">
                        <img src="slide3.jpg" alt="Proof 3" class="w-full h-full object-contain">
                    </div>

                    <div class="w-full h-full flex-shrink-0 snap-center flex items-center justify-center bg-black relative">
                        <img src="slide4.jpg" alt="Proof 4" class="w-full h-full object-contain">
                    </div>

                </div>

                <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-2 z-20">
                    <button onclick="scrollToSlide(0)" class="w-2 h-2 rounded-full bg-green-400 opacity-100 transition-all slider-dot ring-2 ring-black"></button>
                    <button onclick="scrollToSlide(1)" class="w-2 h-2 rounded-full bg-green-400 opacity-40 transition-all slider-dot ring-2 ring-black"></button>
                    <button onclick="scrollToSlide(2)" class="w-2 h-2 rounded-full bg-green-400 opacity-40 transition-all slider-dot ring-2 ring-black"></button>
                    <button onclick="scrollToSlide(3)" class="w-2 h-2 rounded-full bg-green-400 opacity-40 transition-all slider-dot ring-2 ring-black"></button>
                </div>
            </div>
        </div>
